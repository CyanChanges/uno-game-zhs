<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于 — UNO</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #about {
            background: #1e1e1e;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            max-width: 520px;
            width: 100%;
            color: #e0e0e0;
            line-height: 1.8;
        }

        #about h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #fff;
            text-align: center;
        }

        #about h3 {
            font-size: 1.1rem;
            color: #667eea;
            margin: 20px 0 10px;
        }

        #about p {
            margin: 4px 0;
            font-size: 0.9rem;
            color: #a0aec0;
        }

        #about a {
            color: #667eea;
        }

        #about #clear-storage {
            width: 100%;
            padding: 12px 24px;
            margin-top: 24px;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            box-shadow: 0 6px 15px rgba(255, 107, 107, 0.3);
            font-family: inherit;
        }

        #about #clear-storage:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
        }

        #about .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #667eea;
            text-decoration: none;
            font-size: 0.85rem;
        }

        #about .back-link:hover {
            color: #764ba2;
        }
    </style>
</head>

<body>
    <h1>UNO</h1>
    <div id="about">
        <h2>关于</h2>

        <h3>技术栈</h3>
        <p>TypeScript - Apache-2.0</p>
        <p>Node.js · WebSocket (ws) - MIT</p>
        <p>pkg - MIT</p>
        <p>Blobmoji SVG - MIT</p>
        <p>Vitest - MIT</p>
        <p>Playwright - Apache-2.0</p>
        <p>tsx - MIT</p>

        <h3>许可证</h3>
        <p><a href="https://opensource.org/license/bsd-3-clause" target="_blank">BSD 3-Clause License</a></p>
        <p>Copyright &copy; 2026 miruku (lovemilk)</p>

        <h3>存储</h3>
        <button id="clear-storage">清除本地存储状态</button>
        <p id="clear-msg" style="color:#48bb78;text-align:center;margin-top:8px;display:none;">已清除</p>

        <a class="back-link" href="/"><< 返回游戏</a>
    </div>

    <footer class="user-select">Copyright &copy; 2026 miruku (lovemilk)</footer>

    <script>
        document.getElementById('clear-storage').addEventListener('click', () => {
            if (!confirm('确定要清除所有本地存储状态吗？此操作不可撤销。')) return;
            const msgEl = document.getElementById('clear-msg')
            const delay = msgEl.style.display === 'none' ? 0 : 500
            msgEl.style.display = 'none';

            localStorage.clear();
            setTimeout(() => {
                msgEl.style.display = 'block';
            }, delay);
        });
    </script>
</body>

</html>
