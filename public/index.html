<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO | Copyright (C) 2026 miruku (lovemilk)</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>UNO</h1>
    <div id="lobby">
        <h2>加入 UNO Game</h2>
        <div>
            <input type="text" id="name" placeholder="玩家名称">
        </div>
        <div>
            <input type="text" id="lobby-id" placeholder="大厅名称">
        </div>
        <button id="join">加入 (创建)</button>
        <div id="lobby-info" style="display: none;">
            <h3>大厅: <span id="current-lobby-id"></span></h3>
            <p>分享大厅 ID 即可加入!</p>
        </div>
        <ul id="players"></ul>
        <button id="invite-ai" style="display: none;">邀请 AI</button>
        <button id="ready" style="display: none;">准备</button>
    </div>
    <div id="game" style="display: none;">
        <div id="turn-indicator">
            <h3 id="turn-text">等待游戏开始...</h3>
        </div>
        <div id="opponent-hands"></div>
        <div id="center-area">
            <div id="action-buttons">
                <button id="draw-card">抽牌</button>
                <button id="surrender-btn">认输</button>
                <button id="leave-spectate-btn" style="display:none;">退出观战</button>
            </div>
            <div id="discard-pile"></div>
            <div id="wild-color-picker" style="display: none;">
                <h4>选择颜色:</h4>
                <div id="color-options">
                    <div class="color-option" data-color="red" style="background-color: #f35b53;"></div>
                    <div class="color-option" data-color="yellow" style="background-color: #f2b010;"></div>
                    <div class="color-option" data-color="green" style="background-color: #2abd68;"></div>
                    <div class="color-option" data-color="blue" style="background-color: #41b2cf;"></div>
                </div>
                <button id="cancel-wild-btn">取消</button>
            </div>
        </div>
        <div id="reaction-bar">
            <div id="reaction-emojis">
                <button class="reaction-emoji" data-emoji="😂">😂</button>
                <button class="reaction-emoji" data-emoji="😡">😡</button>
                <button class="reaction-emoji" data-emoji="😱">😱</button>
                <button class="reaction-emoji" data-emoji="👍">👍</button>
                <button class="reaction-emoji" data-emoji="👎">👎</button>
                <button class="reaction-emoji" data-emoji="🎉">🎉</button>
                <button class="reaction-emoji" data-emoji="😭">😭</button>
                <button class="reaction-emoji" data-emoji="🔥">🔥</button>
            </div>
            <div id="reaction-text-area">
                <input type="text" id="reaction-text-input" maxlength="200" placeholder="发送消息...">
                <button id="reaction-send-btn">发送</button>
            </div>
        </div>
        <div id="player-hand-area">
            <div id="card-controls">
                <button id="card-layout-toggle">切换到滚动排列</button>
            </div>
            <div id="player-hand"></div>
        </div>
    </div>
    <div id="modal-overlay" class="hidden">
        <div id="modal-box">
            <p id="modal-message" class="user-select"></p>
            <div id="modal-actions">
                <button id="modal-cancel-btn" class="modal-btn">取消</button>
                <button id="modal-ok-btn" class="modal-btn modal-btn-primary">确定</button>
            </div>
        </div>
    </div>
    <div id="game-over-overlay" class="hidden">
        <div id="game-over-content">
            <div id="game-over-icon"></div>
            <h2 id="game-over-title"></h2>
            <p id="game-over-message"></p>
            <button id="game-over-btn">返回大厅</button>
        </div>
    </div>
    <div id="dev-panel">
        <div id="dev-panel-header">DEV <span id="dev-panel-toggle">▼</span></div>
        <div id="dev-panel-body">
            <button class="dev-btn" data-action="dev_add_cards" data-count="1">+1 牌</button>
            <button class="dev-btn" data-action="dev_add_cards" data-count="5">+5 牌</button>
            <button class="dev-btn" data-action="dev_add_all_cards">全部牌</button>
            <button class="dev-btn" data-action="dev_remove_cards" data-count="1">-1 牌</button>
            <button class="dev-btn" data-action="dev_remove_cards" data-count="5">-5 牌</button>
            <button class="dev-btn" data-action="dev_skip">跳回合</button>
            <button class="dev-btn" id="dev-disconnect-btn" data-action="dev_disconnect">断开</button>
            <button class="dev-btn" data-action="dev_export_state">导出状态</button>
            <button class="dev-btn call-win-btn" data-action="dev_call_win">🏆 胜利</button>
        </div>
    </div>
    <footer class="user-select">Copyright (C) 2026 miruku (lovemilk), <a target="_blank"
            href="https://aka.lovemilk.top/github/uno-game-zhs/blob/main/LICENSE">BSD 3-Clause License</a></footer>
    <script src="client.js"></script>
</body>

</html>
